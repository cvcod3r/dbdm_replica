# 数据源配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: dm.jdbc.driver.DmDriver
    druid:
      stat-view-servlet: # 配置监控页功能
        enabled: true
        login-username: admin #配置druid登录账号密码
        login-password: 123
        reset-enable: false
      # 主库数据源
      master:
        url: jdbc:dm://81.70.167.102:5236/DBMS?clobAsString=1&useUnicode=true&characterEncoding=utf-8
        #数据库的使用用户
        username: SYSDBA
        #实际使用数据库的密码
        password: SYSDBA001
        #    url: jdbc:dm://127.0.0.1:5236/DBMS?clobAsString=1&useUnicode=true&characterEncoding=utf-8
        #      #数据库的使用用户
        #    username: SYSDBA
        #    #实际使用数据库的密码
        #    password: SYSDBA
      # 从库数据源
      slave:
        # 从数据源开关/默认关闭
        enabled: false
        url:
        username:
        password:
      # 初始连接数
      initialSize: 5
      # 最小连接池数量
      minIdle: 10
      # 最大连接池数量
      maxActive: 20
      # 配置获取连接等待超时的时间
      maxWait: 60000
      # 配置连接超时时间
      connectTimeout: 30000
      # 配置网络超时时间
      socketTimeout: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      timeBetweenEvictionRunsMillis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      minEvictableIdleTimeMillis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      maxEvictableIdleTimeMillis: 900000
      # 配置检测连接是否有效
      validationQuery: SELECT 1 FROM DUAL
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      webStatFilter:
        enabled: true
      aop-patterns: com.dbms.dao.*
      statViewServlet:
        enabled: true
        # 设置白名单，不填则允许所有访问
        allow:
        url-pattern: /druid/*
        # 控制台管理用户名和密码
        login-username: ruoyi
        login-password: 123456
      filter:
        stat:
          enabled: true
          # 慢SQL记录
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
